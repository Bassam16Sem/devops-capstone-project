name: CI Build

# Kapan alur ini berjalan?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Langkah mengambil kode
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 2. Langkah memeriksa kode (Linting)
      - name: Lint with Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 3. Langkah menjalankan unit test (Nosetests)
      - name: Run unit tests with Nosetests
        run: |
          nosetests
